<!--
================================================================================
  ThingsBoard Custom Control Widget – Pico File Uploader
================================================================================

  Anleitung:
  1.  ThingsBoard öffnen → Widget Library → "+ Widget bundle" oder vorhandenes Bundle
  2.  "+ Widget" → Typ: "Control widget"
  3.  Den Inhalt der Tabs wie folgt befüllen:

      [ HTML ]      → Abschnitt "HTML TEMPLATE" unten
      [ JavaScript ]→ Abschnitt "JAVASCRIPT" unten
      [ CSS ]       → Abschnitt "CSS" unten (optional)
      [ Resources ] → leer lassen

  4.  Widget auf ein Dashboard ziehen
      → Kein Zielgerät / Entitätsalias nötig — das Widget lädt alle Geräte
        mit dem Profil "PicoData" automatisch aus der ThingsBoard-API und
        zeigt sie im Dropdown an.
      → Der angemeldete Nutzer benötigt Lesezugriff auf Geräteinformationen
        sowie Schreibzugriff für Server-seitige RPCs (Tenant-Admin oder
        entsprechende Rolle).

  Geräte-Dropdown:
      - Beim Start werden alle Geräte mit Profil "PicoData" geladen
        (max. 100, alphabetisch sortiert).
      - Der ↻-Button aktualisiert die Liste (z. B. nach Hinzufügen eines Geräts).

  Unterstützte RPCs:
      - uploadFile  { filename, content }  → Datei auf dem Pico ablegen
      - reboot      {}                     → Pico neustarten
================================================================================
-->

<!-- ══════════════════════════════════════════════════════ HTML TEMPLATE ══ -->
<div id="pico-uploader">

  <div class="row">
    <label>Zielgerät</label>
    <select id="pu-device"><option value="">-- Lade Geräte… --</option></select>
    <button id="pu-refresh" class="tb-btn" title="Geräteliste neu laden">↻</button>
  </div>

  <div class="row">
    <label>Dateiname</label>
    <select id="pu-select">
      <option value="main.py">main.py</option>
      <option value="boot.py">boot.py</option>
      <option value="config.py">config.py</option>
      <option value="__custom__">-- eigener Name --</option>
    </select>
    <input id="pu-custom" type="text" placeholder="dateiname.py" style="display:none;">
  </div>

  <div class="row">
    <label>Datei laden</label>
    <input id="pu-file" type="file" accept=".py,.txt,.json">
  </div>

  <div class="row editor-row">
    <label>Inhalt</label>
    <textarea id="pu-editor" spellcheck="false" placeholder="# Python-Code hier eingeben oder Datei laden..."></textarea>
  </div>

  <div class="row actions">
    <button id="pu-send" class="tb-btn primary">&#8593; Auf Pico übertragen</button>
    <button id="pu-reboot" class="tb-btn danger">&#8635; Pico neustarten</button>
  </div>

  <div id="pu-status" class="status"></div>

</div>
<!-- ════════════════════════════════════════════════════════════════════════ -->


<!-- ══════════════════════════════════════════════════════════ JAVASCRIPT ══
     (Diesen Abschnitt in den "JavaScript"-Tab des Widget-Editors kopieren)
═══════════════════════════════════════════════════════════════════════════ -->
<script id="JAVASCRIPT_TAB_CONTENT" type="text/plain">

self.onInit = function () {

    var deviceSel = document.getElementById('pu-device');
    var refreshBtn= document.getElementById('pu-refresh');
    var sel      = document.getElementById('pu-select');
    var custom   = document.getElementById('pu-custom');
    var fileIn   = document.getElementById('pu-file');
    var editor   = document.getElementById('pu-editor');
    var sendBtn  = document.getElementById('pu-send');
    var rebootBtn= document.getElementById('pu-reboot');
    var status   = document.getElementById('pu-status');

    // ── Hilfsfunktionen ──────────────────────────────────────────────────

    function setStatus(msg, type) {
        status.textContent = msg;
        status.className = 'status ' + (type || '');
    }

    function getFilename() {
        if (sel.value === '__custom__') {
            return custom.value.trim();
        }
        return sel.value;
    }

    // ── Geräteliste laden (gefiltert auf PicoData-Profil) ────────────────

    function loadDevices() {
        deviceSel.innerHTML = '<option value="">-- Lade Geräte… --</option>';
        deviceSel.disabled = true;

        self.ctx.http.get(
            '/api/tenant/deviceInfos?pageSize=100&page=0&sortProperty=name&sortOrder=ASC'
        ).subscribe(
            function (resp) {
                var devices = (resp.data || []).filter(function (d) {
                    return d.deviceProfileName === 'PicoData';
                });
                deviceSel.innerHTML = '';
                if (devices.length === 0) {
                    deviceSel.innerHTML = '<option value="">Keine PicoData-Geräte gefunden</option>';
                    deviceSel.disabled = true;
                    return;
                }
                devices.forEach(function (d) {
                    var opt = document.createElement('option');
                    opt.value = d.id.id;
                    opt.textContent = d.name;
                    deviceSel.appendChild(opt);
                });
                deviceSel.disabled = false;
            },
            function () {
                deviceSel.innerHTML = '<option value="">Fehler beim Laden der Geräte</option>';
                deviceSel.disabled = true;
            }
        );
    }

    refreshBtn.addEventListener('click', loadDevices);
    loadDevices();

    // ── Dateiname-Dropdown ───────────────────────────────────────────────

    sel.addEventListener('change', function () {
        custom.style.display = (sel.value === '__custom__') ? 'inline-block' : 'none';
    });

    // ── Datei vom PC laden ───────────────────────────────────────────────

    fileIn.addEventListener('change', function () {
        var file = fileIn.files[0];
        if (!file) return;

        var found = false;
        for (var i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === file.name) {
                sel.value = file.name;
                found = true;
                break;
            }
        }
        if (!found) {
            sel.value = '__custom__';
            custom.style.display = 'inline-block';
            custom.value = file.name;
        }

        var reader = new FileReader();
        reader.onload = function (e) {
            editor.value = e.target.result;
            setStatus('Datei geladen: ' + file.name + ' (' + file.size + ' Bytes)', 'info');
        };
        reader.readAsText(file, 'utf-8');
    });

    // ── Datei übertragen (RPC: uploadFile) ───────────────────────────────

    sendBtn.addEventListener('click', function () {
        var deviceId = deviceSel.value;
        var filename = getFilename();
        var content  = editor.value;

        if (!deviceId) {
            setStatus('Bitte Zielgerät auswählen.', 'error');
            return;
        }
        if (!filename) {
            setStatus('Bitte Dateinamen angeben.', 'error');
            return;
        }
        if (!content) {
            setStatus('Inhalt ist leer.', 'error');
            return;
        }

        setStatus('Übertrage ' + filename + ' an ' + deviceSel.options[deviceSel.selectedIndex].text + ' …', 'info');
        sendBtn.disabled = true;

        self.ctx.http.post(
            '/api/rpc/twoway/' + deviceId,
            { method: 'uploadFile', params: { filename: filename, content: content }, timeout: 15000 }
        ).subscribe(
            function (response) {
                sendBtn.disabled = false;
                if (response && response.success) {
                    setStatus('✓ ' + filename + ' erfolgreich übertragen.', 'ok');
                } else {
                    var err = (response && response.error) ? response.error : 'Unbekannter Fehler';
                    setStatus('✗ Fehler: ' + err, 'error');
                }
            },
            function (error) {
                sendBtn.disabled = false;
                setStatus('✗ RPC-Fehler: ' + (error.message || error), 'error');
            }
        );
    });

    // ── Neustart (RPC: reboot) ────────────────────────────────────────────

    rebootBtn.addEventListener('click', function () {
        var deviceId = deviceSel.value;
        if (!deviceId) {
            setStatus('Bitte Zielgerät auswählen.', 'error');
            return;
        }
        var deviceName = deviceSel.options[deviceSel.selectedIndex].text;
        if (!confirm(deviceName + ' wirklich neustarten?')) return;

        setStatus('Neustart wird ausgelöst …', 'info');
        rebootBtn.disabled = true;

        self.ctx.http.post(
            '/api/rpc/oneway/' + deviceId,
            { method: 'reboot', params: {}, timeout: 5000 }
        ).subscribe(
            function () {
                rebootBtn.disabled = false;
                setStatus('✓ Neustart ausgelöst.', 'ok');
            },
            function (error) {
                rebootBtn.disabled = false;
                setStatus('✗ RPC-Fehler: ' + (error.message || error), 'error');
            }
        );
    });
};

self.onDestroy = function () {};

</script>
<!-- ════════════════════════════════════════════════════════════════════════ -->

}

}

}
